name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Import check — dicom_utils
        run: uv run python -c "import scripts.dicom_utils"

      - name: Import check — medgemma_api
        run: |
          uv run python -c "
          from pathlib import Path
          import importlib.util
          spec = importlib.util.spec_from_file_location('m', Path('scripts/medgemma_api.py'))
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          "

      - name: Verify CLI help
        run: uv run python scripts/medgemma_api.py --help
